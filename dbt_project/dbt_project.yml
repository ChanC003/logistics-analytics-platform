name: 'logistics'
version: '1.0.0'
config-version: 2

# Profile nam ngay trong dbt_project/ (DBT_PROFILES_DIR tro vao day) -- xem profiles.yml
profile: 'logistics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Bien dung chung -- route quarantine theo co _data_quality (khong hardcode trong model)
vars:
  quarantine_quality_flag: 'heavy_issue'

# Materialization theo tang: staging -> view, core -> table, mart -> table
models:
  logistics:
    staging:
      +materialized: view
      +schema: staging
    core:
      +materialized: table
      +schema: core
    mart:
      +materialized: table
      +schema: mart

seeds:
  logistics:
    +schema: seed

snapshots:
  logistics:
    +schema: snapshot
